version: '3.8'

services:
  fancast:
    build: .
    ports:
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - TREASURY_WALLET=${TREASURY_WALLET}
      - PORT=3000
    restart: unless-stopped
